<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H&C Otomotiv — Instagram Post Üretici</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080e;
  --surface: #0e0e18;
  --surface2: #151522;
  --surface3: #1c1c2e;
  --border: #252538;
  --text: #e2e2ee;
  --text-dim: #6e6e88;
  --accent: #00e09a;
  --accent-dim: rgba(0,224,154,0.08);
  --accent-border: rgba(0,224,154,0.2);
  --red: #ff5566;
  --red-bg: rgba(255,85,102,0.08);
  --blue: #5588ff;
  --blue-bg: rgba(85,136,255,0.08);
  --yellow: #ffcc44;
  --yellow-bg: rgba(255,204,68,0.08);
  --orange: #ff8844;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
.app { max-width: 760px; margin: 0 auto; padding: 16px; }

/* Grain overlay */
body::after {
  content: '';
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999;
}

/* Header */
.header {
  text-align: center;
  padding: 32px 0 24px;
  position: relative;
}
.header::after {
  content: '';
  position: absolute; bottom: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.brand {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 12px;
}
.header h1 {
  font-size: 28px; font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, #fff, #aab);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header p {
  font-size: 13px; color: var(--text-dim); margin-top: 6px; font-weight: 300;
}

/* Today banner */
.today-banner {
  margin: 24px 0; padding: 18px 20px;
  background: linear-gradient(135deg, var(--accent-dim), var(--blue-bg));
  border: 1px solid var(--accent-border); border-radius: var(--radius);
  animation: fadeSlide 0.6s ease;
}
.today-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 6px;
}
.today-content { font-size: 15px; font-weight: 600; }
.today-hint { font-size: 12px; color: var(--text-dim); margin-top: 3px; }

/* Toggle row */
.toggle-row { display: flex; gap: 8px; margin-bottom: 20px; }
.toggle-btn {
  flex: 1; padding: 11px; border-radius: 10px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; font-size: 13px;
  font-family: 'Outfit', sans-serif; font-weight: 600;
  transition: all 0.25s;
}
.toggle-btn:hover { border-color: var(--accent); color: var(--text); }
.toggle-btn.active {
  background: var(--surface2); border-color: var(--accent);
  color: var(--accent);
}

/* Section labels */
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 12px; display: block;
}

/* Category grid */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
.cat-btn {
  padding: 16px 14px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); cursor: pointer; text-align: left;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.cat-btn:hover { border-color: #444; transform: translateY(-1px); }
.cat-btn.selected {
  border-color: var(--accent); background: var(--accent-dim);
  box-shadow: 0 0 20px rgba(0,224,154,0.05);
}
.cat-icon { font-size: 22px; margin-bottom: 6px; }
.cat-name { font-size: 13px; font-weight: 700; }
.cat-desc { font-size: 10px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }

/* Expandable panels */
.panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 16px; overflow: hidden;
  animation: fadeSlide 0.3s ease;
}
.panel-inner { padding: 18px; }
.panel h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }

/* Weekly calendar */
.week-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.week-row:last-child { border: none; }
.week-day {
  width: 80px; font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.week-day.today { color: var(--accent); }
.week-icon { font-size: 16px; flex-shrink: 0; }
.week-info { flex: 1; }
.week-cat { font-size: 13px; font-weight: 600; }
.week-hint { font-size: 11px; color: var(--text-dim); }

/* Content ideas chips */
.ideas-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.idea-chip {
  padding: 7px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: #bbb; cursor: pointer; font-size: 12px;
  font-family: 'Outfit', sans-serif; transition: all 0.2s;
}
.idea-chip:hover { border-color: var(--accent); color: var(--text); }
.idea-chip.selected { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

/* Textarea */
.input-area {
  width: 100%; padding: 16px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 14px; font-family: 'Outfit', sans-serif;
  resize: vertical; min-height: 90px; outline: none;
  transition: border-color 0.2s;
}
.input-area:focus { border-color: var(--accent); }
.input-area::placeholder { color: var(--text-dim); }

/* Tone selector */
.tone-row { display: flex; gap: 6px; margin: 12px 0; flex-wrap: wrap; }
.tone-btn {
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; font-size: 12px;
  font-family: 'Outfit', sans-serif; font-weight: 500;
  transition: all 0.2s;
}
.tone-btn:hover { border-color: #555; color: var(--text); }
.tone-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 700; }

/* Generate buttons */
.gen-row { display: flex; gap: 8px; margin-top: 12px; }
.gen-btn {
  flex: 1; padding: 15px; border-radius: 10px; border: none;
  background: var(--accent); color: #000; font-weight: 800;
  font-size: 15px; cursor: pointer; font-family: 'Outfit', sans-serif;
  transition: all 0.2s; letter-spacing: -0.3px;
}
.gen-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,224,154,0.2); }
.gen-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
.gen-btn-alt {
  padding: 15px 20px; border-radius: 10px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-weight: 600; font-size: 13px;
  cursor: pointer; font-family: 'Outfit', sans-serif;
  transition: all 0.2s;
}
.gen-btn-alt:hover { border-color: #555; color: var(--text); }

/* Output card */
.output-card {
  background: var(--surface); border: 1px solid var(--accent-border);
  border-radius: 16px; overflow: hidden; margin: 24px 0;
  animation: fadeSlide 0.5s ease;
  box-shadow: 0 0 40px rgba(0,224,154,0.03);
}
.output-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.output-title { font-size: 14px; font-weight: 700; }
.output-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.output-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; padding: 4px 10px; border-radius: 20px;
  background: var(--accent-dim); color: var(--accent);
  font-weight: 700; letter-spacing: 1px;
}

/* Photo tip */
.photo-tip {
  margin: 16px 20px 0; padding: 12px 14px; border-radius: 8px;
  background: var(--blue-bg); border: 1px solid rgba(85,136,255,0.15);
}
.photo-tip-label {
  font-size: 10px; color: var(--blue); font-weight: 700;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;
  margin-bottom: 4px;
}
.photo-tip-text { font-size: 12px; color: #8899cc; }

/* Caption block */
.caption-block { padding: 16px 20px; }
.caption-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.caption-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
}
.copy-btn {
  padding: 5px 14px; border-radius: 6px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; font-size: 11px;
  font-family: 'Outfit', sans-serif; font-weight: 600;
  transition: all 0.2s;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { background: var(--accent); color: #000; border-color: var(--accent); }
.caption-text {
  padding: 16px; border-radius: 8px;
  background: var(--bg); border: 1px solid var(--border);
  white-space: pre-wrap; font-size: 13px; line-height: 1.8;
  color: #ccccd8;
}
.hashtag-text {
  padding: 14px; border-radius: 8px;
  background: var(--bg); border: 1px solid var(--border);
  font-size: 12px; color: var(--blue); line-height: 1.9;
  word-break: break-word;
}

/* Copy all button */
.copy-all-btn {
  width: 100%; padding: 15px; border-radius: 10px; border: none;
  background: var(--surface3); color: var(--text);
  font-weight: 700; font-size: 14px; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: all 0.2s;
}
.copy-all-btn:hover { background: var(--accent); color: #000; }
.copy-all-btn.copied { background: var(--accent); color: #000; }

/* Pipeline steps */
.pipeline { margin-top: 24px; }
.pipe-step {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.pipe-step:last-child { border: none; }
.pipe-num {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent-dim); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.pipe-text { flex: 1; font-size: 13px; padding-top: 4px; }
.pipe-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-dim); flex-shrink: 0; padding-top: 6px;
}

/* Footer */
.footer {
  text-align: center; padding: 32px 0 16px;
  font-size: 11px; color: #333;
  font-family: 'JetBrains Mono', monospace;
}

/* Animations */
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 520px) {
  .cat-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
  .cat-btn { padding: 12px 10px; }
  .header h1 { font-size: 22px; }
  .tone-row { gap: 4px; }
}
</style>
</head>

const HASHTAGS = {
  before_after: "#öncesisonrası #otomotiv #araçtamiri #şaşmaz #ankara #otoservis #hcotomotiv #mekanik #tamirci #araçbakım",
  tip: "#araçbakım #otobakım #araçipuçları #güvenlik #periyodikbakım #ankara #şaşmaz #hcotomotiv #motoruyarı #sürücüler",
  campaign: "#kampanya #indirim #otoservis #araçbakım #şaşmaz #ankara #fırsat #hcotomotiv #uygunfiyat #servis",

  daily_work: "#gününtamiri #otoservis #mekanik #araçtamiri #şaşmaz #ankara #hcotomotiv #tamirci #servis #otomotiv",
  customer: "#müşterimemnuniyeti #googleyorum #güvenilir #otoservis #şaşmaz #ankara #hcotomotiv #5yıldız #referans",
  towing: "#çekici #yoldakaldım #ücretsizçekici #acilservis #ankara #şaşmaz #hcotomotiv #araçkurtarma #7günacık",
  question: "#anket #soru #otomotivbilgi #araçbakım #şaşmaz #ankara #hcotomotiv #etkileşim #arabam #sürücüler",
  reels: "#reels #otoservis #mekanik #timelapse #araçtamiri #şaşmaz #ankara #hcotomotiv #keşfet #otomotiv",
  seasonal: "#mevsimbakım #araçbakım #kışhazırlık #yazbakım #otoservis #şaşmaz #ankara #hcotomotiv #güvenlik"
};

// State
let state = {
  selectedCat: null,
  selectedTone: "story",
  content: "",
  output: null,
  variant: 0,
  showCalendar: false,
  showIdeas: false,
  copied: null
};

function getTodayPlan() {
  const d = new Date().getDay();
  const map = [6,0,1,2,3,4,5];
  return { ...WEEKLY[map[d]], index: map[d] };
}

function generate() {
  const { selectedCat, selectedTone, content, variant } = state;
  if (!selectedCat || !content.trim()) return;
  const templates = TEMPLATES[selectedCat.id]?.[selectedTone] || TEMPLATES[selectedCat.id]?.story;
  if (!templates) return;
  const idx = variant % templates.length;
  const caption = templates[idx](content.trim());
  const hashtags = HASHTAGS[selectedCat.id] || "";
  state.output = { caption, hashtags, canva: selectedCat.canva, photoTip: selectedCat.photoTip, label: selectedCat.label };
  render();
}

function copyText(text, label) {
  navigator.clipboard.writeText(text);
  state.copied = label;
  render();
  setTimeout(() => { state.copied = null; render(); }, 2000);
}

function render() {
  const today = getTodayPlan();
  const todayCat = CATEGORIES.find(c => c.id === today.catId);
  const { selectedCat, selectedTone, content, output, showCalendar, showIdeas, copied } = state;

  let html = '';

  // Header
  html += `<div class="header">
    <div class="brand">H&C Otomotiv · Şaşmaz</div>
    <h1>Instagram Post Üretici</h1>
    <p>Kategori seç → İçerik yaz → Ton seç → Hazır post al → Paylaş</p>
  </div>`;

  // Today
  html += `<div class="today-banner">
    <div class="today-label">📅 Bugünün Önerisi — ${today.day}</div>
    <div class="today-content">${todayCat.icon} ${todayCat.label}</div>
    <div class="today-hint">${today.hint}</div>
  </div>`;

  // Toggles
  html += `<div class="toggle-row">
    <button class="toggle-btn ${showCalendar?'active':''}" onclick="toggleCal()">📆 Haftalık Plan</button>
    <button class="toggle-btn ${showIdeas?'active':''}" onclick="toggleIdeas()">💡 İçerik Fikirleri</button>
  </div>`;

  // Calendar
  if (showCalendar) {
    html += `<div class="panel"><div class="panel-inner"><h3>Haftalık İçerik Takvimi</h3>`;
    WEEKLY.forEach((w, i) => {
      const cat = CATEGORIES.find(c => c.id === w.catId);
      const isToday = i === today.index;
      html += `<div class="week-row">
        <div class="week-day ${isToday?'today':''}">${w.day}</div>
        <div class="week-icon">${cat.icon}</div>
        <div class="week-info">
          <div class="week-cat">${cat.label}</div>
          <div class="week-hint">${w.hint}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Ideas
  if (showIdeas && selectedCat && IDEAS[selectedCat.id]) {
    html += `<div class="panel"><div class="panel-inner"><h3>${selectedCat.icon} ${selectedCat.label} İçerik Fikirleri</h3>
    <div class="ideas-wrap">`;
    IDEAS[selectedCat.id].forEach(idea => {
      html += `<button class="idea-chip ${content===idea?'selected':''}" onclick="pickIdea('${idea.replace(/'/g,"\\'")}')">${idea}</button>`;
    });
    html += `</div></div></div>`;
  }

  // Categories
  html += `<span class="section-label">1. Kategori Seçin</span><div class="cat-grid">`;
  CATEGORIES.forEach(cat => {
    html += `<button class="cat-btn ${selectedCat?.id===cat.id?'selected':''}" onclick="pickCat('${cat.id}')">
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-name">${cat.label}</div>
      <div class="cat-desc">${cat.desc}</div>
    </button>`;
  });
  html += `</div>`;

  // Input + Tone + Generate
  if (selectedCat) {
    html += `<span class="section-label">2. İçerik / Konu</span>
    <textarea class="input-area" id="contentInput" placeholder="Örn: '${(IDEAS[selectedCat.id]||['İçerik yazın'])[0]}'" oninput="updateContent(this.value)">${content}</textarea>`;

    html += `<span class="section-label" style="margin-top:16px">3. Ton Seçin</span><div class="tone-row">`;
    TONES.forEach(t => {
      html += `<button class="tone-btn ${selectedTone===t.id?'active':''}" onclick="pickTone('${t.id}')">${t.label}</button>`;
    });
    html += `</div>`;

    html += `<div class="gen-row">
      <button class="gen-btn" ${content.trim()?'':'disabled'} onclick="doGenerate()">Post Oluştur ✨</button>
      ${output ? `<button class="gen-btn-alt" onclick="doVariant()">🔄 Farklı</button>` : ''}
    </div>`;
  }

  // Output
  if (output) {
    html += `<div class="output-card">
      <div class="output-header">
        <div>
          <div class="output-title">${output.label} Postu</div>
          <div class="output-subtitle">Canva: ${output.canva} · Ton: ${TONES.find(t=>t.id===selectedTone)?.label||'Hikaye'}</div>
        </div>
        <div class="output-badge">HAZIR</div>
      </div>
      <div class="photo-tip">
        <div class="photo-tip-label">📸 FOTOĞRAF İPUCU</div>
        <div class="photo-tip-text">${output.photoTip}</div>
      </div>
      <div class="caption-block">
        <div class="caption-header">
          <span class="caption-label">Açıklama Metni</span>
          <button class="copy-btn ${copied==='caption'?'copied':''}" onclick="doCopy('caption')">
            ${copied==='caption'?'✓ Kopyalandı':'Kopyala'}
          </button>
        </div>
        <div class="caption-text">${output.caption}</div>
      </div>
      <div class="caption-block" style="padding-top:0">
        <div class="caption-header">
          <span class="caption-label">Hashtag'ler</span>
          <button class="copy-btn ${copied==='hash'?'copied':''}" onclick="doCopy('hash')">
            ${copied==='hash'?'✓ Kopyalandı':'Kopyala'}
          </button>
        </div>
        <div class="hashtag-text">${output.hashtags}</div>
      </div>
      <div style="padding:0 20px 20px">
        <button class="copy-all-btn ${copied==='all'?'copied':''}" onclick="doCopy('all')">
          ${copied==='all'?'✓ Tümü Kopyalandı!':'📋 Metin + Hashtag Birlikte Kopyala'}
        </button>
      </div>
    </div>`;
  }

  // Pipeline
  html += `<div class="panel pipeline"><div class="panel-inner">
    <h3>📱 Günlük Pipeline — 10 Dakikada Post</h3>`;
  [
    {s:"1",t:"Serviste fotoğraf çek (iş başı, öncesi/sonrası, araç)",time:"2 dk"},
    {s:"2",t:"Bu sistemi aç → kategori + ton seç → konu yaz → post oluştur",time:"2 dk"},
    {s:"3",t:"Canva'da şablonunuza fotoğrafı ve metni ekleyin",time:"4 dk"},
    {s:"4",t:"Instagram'a yükle → metni yapıştır → hashtag ekle → paylaş",time:"2 dk"}
  ].forEach(p => {
    html += `<div class="pipe-step">
      <div class="pipe-num">${p.s}</div>
      <div class="pipe-text">${p.t}</div>
      <div class="pipe-time">${p.time}</div>
    </div>`;
  });
  html += `</div></div>`;

  html += `<div class="footer">H&C Otomotiv · Instagram Pipeline v2.0</div>`;

  document.getElementById('app').innerHTML = html;
}

// Event handlers
function pickCat(id) {
  state.selectedCat = CATEGORIES.find(c => c.id === id);
  state.output = null;
  state.variant = 0;
  render();
}
function pickTone(id) { state.selectedTone = id; state.output = null; render(); }
function pickIdea(idea) { state.content = idea; render(); }
function updateContent(v) { state.content = v; }
function toggleCal() { state.showCalendar = !state.showCalendar; state.showIdeas = false; render(); }
function toggleIdeas() { state.showIdeas = !state.showIdeas; state.showCalendar = false; render(); }
function doGenerate() { state.content = document.getElementById('contentInput')?.value || state.content; generate(); }
function doVariant() { state.variant++; state.content = document.getElementById('contentInput')?.value || state.content; generate(); }
function doCopy(type) {
  if (!state.output) return;
  let text = '';
  if (type === 'caption') text = state.output.caption;
  else if (type === 'hash') text = state.output.hashtags;
  else text = state.output.caption + '\n\n' + state.output.hashtags;
  copyText(text, type);
}

// Init
render();
</script>
</body>
</html>
