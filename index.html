<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H&C Otomotiv — Instagram Post Üretici</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080e;
  --surface: #0e0e18;
  --surface2: #151522;
  --surface3: #1c1c2e;
  --border: #252538;
  --text: #e2e2ee;
  --text-dim: #6e6e88;
  --accent: #00e09a;
  --accent-dim: rgba(0,224,154,0.08);
  --accent-border: rgba(0,224,154,0.2);
  --red: #ff5566;
  --red-bg: rgba(255,85,102,0.08);
  --blue: #5588ff;
  --blue-bg: rgba(85,136,255,0.08);
  --yellow: #ffcc44;
  --yellow-bg: rgba(255,204,68,0.08);
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999;
}
button, input, textarea { font: inherit; }
.app { max-width: 760px; margin: 0 auto; padding: 16px; }
.header { text-align: center; padding: 32px 0 24px; position: relative; }
.header::after {
  content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.brand {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 12px;
}
.header h1 {
  font-size: 28px; font-weight: 800; letter-spacing: 0;
  background: linear-gradient(135deg, #fff, #aab);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header p { font-size: 13px; color: var(--text-dim); margin-top: 6px; font-weight: 300; }
.today-banner {
  margin: 24px 0; padding: 18px 20px;
  background: linear-gradient(135deg, var(--accent-dim), var(--blue-bg));
  border: 1px solid var(--accent-border); border-radius: var(--radius);
  animation: fadeSlide 0.6s ease;
}
.today-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 6px;
}
.today-content { font-size: 15px; font-weight: 600; }
.today-hint { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
.toggle-row, .frame-row { display: flex; gap: 8px; margin-bottom: 20px; }
.toggle-btn, .frame-btn {
  flex: 1; padding: 11px; border-radius: 10px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; font-size: 13px;
  font-weight: 600; transition: all 0.25s;
}
.toggle-btn:hover, .frame-btn:hover { border-color: var(--accent); color: var(--text); }
.toggle-btn.active, .frame-btn.active {
  background: var(--surface2); border-color: var(--accent); color: var(--accent);
}
.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text-dim); margin: 18px 0 12px; display: block;
}
.upload-zone {
  display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center;
  width: 100%; padding: 18px; border-radius: var(--radius);
  border: 1px dashed rgba(0,224,154,0.35); background: var(--surface);
  color: var(--text); cursor: pointer; text-align: left;
}
.upload-zone.drag { border-color: var(--accent); background: var(--accent-dim); }
.upload-title { font-size: 15px; font-weight: 800; }
.upload-hint { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
.upload-meta {
  font-family: 'JetBrains Mono', monospace; color: var(--accent);
  font-size: 10px; margin-top: 8px; word-break: break-word;
}
.thumb {
  width: 86px; height: 86px; border-radius: 10px; object-fit: cover;
  border: 1px solid var(--border); background: var(--bg);
}
.warning, .error, .success {
  margin-top: 12px; padding: 12px 14px; border-radius: 10px; font-size: 13px;
}
.warning { background: var(--yellow-bg); border: 1px solid rgba(255,204,68,0.18); color: #d9bb61; }
.error { background: var(--red-bg); border: 1px solid rgba(255,85,102,0.22); color: #ff9aa5; }
.success { background: var(--accent-dim); border: 1px solid var(--accent-border); color: var(--accent); }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
.cat-btn {
  padding: 16px 14px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); cursor: pointer; text-align: left;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.cat-btn:hover { border-color: #444; transform: translateY(-1px); }
.cat-btn.selected { border-color: var(--accent); background: var(--accent-dim); }
.cat-icon { font-size: 22px; margin-bottom: 6px; }
.cat-name { font-size: 13px; font-weight: 700; }
.cat-desc { font-size: 10px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; }
.panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 16px; overflow: hidden;
  animation: fadeSlide 0.3s ease;
}
.panel-inner { padding: 18px; }
.panel h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.week-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.week-row:last-child { border: none; }
.week-day { width: 80px; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.week-day.today { color: var(--accent); }
.week-icon { font-size: 16px; flex-shrink: 0; }
.week-info { flex: 1; }
.week-cat { font-size: 13px; font-weight: 600; }
.week-hint { font-size: 11px; color: var(--text-dim); }
.ideas-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.idea-chip {
  padding: 7px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: #bbb; cursor: pointer; font-size: 12px; transition: all 0.2s;
}
.idea-chip:hover { border-color: var(--accent); color: var(--text); }
.idea-chip.selected { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.input-area, .email-input {
  width: 100%; padding: 16px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s;
}
.input-area { resize: vertical; min-height: 90px; }
.input-area:focus, .email-input:focus { border-color: var(--accent); }
.input-area::placeholder, .email-input::placeholder { color: var(--text-dim); }
.tone-row { display: flex; gap: 6px; margin: 12px 0; flex-wrap: wrap; }
.tone-btn {
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; font-size: 12px;
  font-weight: 500; transition: all 0.2s;
}
.tone-btn:hover { border-color: #555; color: var(--text); }
.tone-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 700; }
.gen-row { display: flex; gap: 8px; margin-top: 12px; }
.gen-btn {
  flex: 1; padding: 15px; border-radius: 10px; border: none;
  background: var(--accent); color: #000; font-weight: 800;
  font-size: 15px; cursor: pointer; transition: all 0.2s; letter-spacing: 0;
}
.gen-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,224,154,0.2); }
.gen-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
.gen-btn-alt {
  padding: 15px 20px; border-radius: 10px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); font-weight: 600; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.gen-btn-alt:hover { border-color: #555; color: var(--text); }
.output-card {
  background: var(--surface); border: 1px solid var(--accent-border);
  border-radius: 16px; overflow: hidden; margin: 24px 0;
  animation: fadeSlide 0.5s ease; box-shadow: 0 0 40px rgba(0,224,154,0.03);
}
.output-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
}
.output-title { font-size: 14px; font-weight: 700; }
.output-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.output-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; padding: 4px 10px; border-radius: 20px;
  background: var(--accent-dim); color: var(--accent);
  font-weight: 700; letter-spacing: 1px; white-space: nowrap;
}
.caption-block { padding: 16px 20px; }
.caption-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px; gap: 10px;
}
.caption-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
}
.copy-btn, .download-btn {
  padding: 5px 14px; border-radius: 6px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; font-size: 11px;
  font-weight: 600; transition: all 0.2s; text-decoration: none;
}
.copy-btn:hover, .download-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { background: var(--accent); color: #000; border-color: var(--accent); }
.caption-text, .hashtag-text {
  padding: 16px; border-radius: 8px; background: var(--bg);
  border: 1px solid var(--border); white-space: pre-wrap;
}
.caption-text { font-size: 13px; line-height: 1.8; color: #ccccd8; }
.hashtag-text { font-size: 12px; color: var(--blue); line-height: 1.9; word-break: break-word; }
.preview-wrap { padding: 18px 20px 4px; }
.preview-img {
  display: block; width: min(50%, 360px); min-width: 220px;
  height: auto; border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg);
}
.pipeline { margin-top: 24px; }
.pipe-step {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.pipe-step:last-child { border: none; }
.pipe-num {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent-dim); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.pipe-text { flex: 1; font-size: 13px; padding-top: 4px; }
.pipe-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-dim); flex-shrink: 0; padding-top: 6px;
}
.footer {
  text-align: center; padding: 32px 0 16px;
  font-size: 11px; color: #333; font-family: 'JetBrains Mono', monospace;
}
.spinner {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid rgba(0,0,0,0.2); border-top-color: #000;
  display: inline-block; vertical-align: middle; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@media (max-width: 520px) {
  .app { padding: 14px; }
  .cat-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
  .cat-btn { padding: 12px 10px; }
  .header h1 { font-size: 22px; }
  .tone-row { gap: 4px; }
  .upload-zone { grid-template-columns: 1fr; }
  .thumb { width: 100%; height: 160px; }
  .preview-img { width: 100%; min-width: 0; }
  .gen-row, .toggle-row, .frame-row { flex-direction: column; }
}
</style>
</head>

  { day:"Pazar", catId:"customer", hint:"Güven veren yorum veya teşekkür postu" }

const IDEAS = {
  daily_work:["Renault Clio motor bakımı","Fiat Egea fren sistemi tamiri","Ford Focus süspansiyon değişimi","VW Polo klima gaz dolumu","Hyundai i20 periyodik bakım","Toyota Corolla motor arıza tespiti","Opel Astra triger seti değişimi","Honda Civic fren balata değişimi"],
  campaign:["Bu hafta periyodik bakımda %15 indirim","Yaz klima bakım kampanyası — 500₺'den başlayan","Fren bakımı yaptırana ücretsiz araç kontrol","İlk ziyaretinize özel %10 indirim"],
  customer:["Google'da 5 yıldızlı yeni yorumumuz","Müşterimiz aracını memnuniyetle teslim aldı","Düzenli müşterimizden güzel sözler","Tavsiye ile gelen müşteri sayımız artıyor!"],
  towing:["Yolda kalan müşterimizin aracını 30 dakikada kurtardık!","Çekici hizmetimiz 7/24 aktif — Ankara genelinde yanınızdayız","Servisimizde tamir yaptırın, çekici ücreti tamamen bizden","Gece 2'de aradılar, 40 dakikada oradaydık"]

const TEMPLATES = {
  campaign: {
    story: [t => `🏷️ KAMPANYA!\n\n${t}\n\n⏰ Sınırlı süre — Randevunuzu hemen oluşturun!\n\n📍 H&C Otomotiv | Şaşmaz Oto Sanayi\n📞 0541 970 09 11\n💬 WhatsApp: wa.me/905419700911`],
    short: [t => `🔥 ${t}\n\nKaçırmayın!\n\n📍 Şaşmaz | 7/7 açık\n📞 0541 970 09 11`],
    educational: [t => `💰 ${t}\n\nNeden bu kampanya?\nÇünkü düzenli bakım, pahalı tamirden her zaman ucuzdur.\n\n📍 H&C Otomotiv | Şaşmaz\n📞 0541 970 09 11`],
    urgent: [t => `🚨 SON GÜNLER!\n\n${t}\n\nBu fırsat kaçmadan hemen arayın!\n\n📞 0541 970 09 11\n📍 Şaşmaz Oto Sanayi\n💬 WhatsApp: wa.me/905419700911`]
  },
  daily_work: {
    story: [
      t => `🚗 Bugün atölyemizde: ${t}\n\nCihazla arıza tespiti → teşhis → onarım → test sürüşü → teslim.\n\nHer iş titizlikle, her araç özenle.\n\n📍 H&C Otomotiv | Şaşmaz\n📞 0541 970 09 11\n🚛 Yolda mı kaldınız? Çekici bizden!`,
      t => `🔧 Günün işi: ${t}\n\nMüşterimiz sorunu anlattı, biz dinledik, teşhis koyduk ve aynı gün çözdük.\n\nAracınız güvende, siz de rahat olun.\n\n📍 Şaşmaz Oto Sanayi — 7/7 açık\n📞 0541 970 09 11`
    ],
    short: [t => `🔧 ${t} ✅\n\nBugün de bir araç daha yola çıktı.\n\n📍 H&C | Şaşmaz\n📞 0541 970 09 11`],
    educational: [t => `🔍 Bugün gelen araç: ${t}\n\nBu arızanın sebebi neydi? Belirtileri nelerdi?\nKaydırarak öğrenin 👉\n\n📍 H&C Otomotiv | Şaşmaz\n📞 0541 970 09 11`],
    urgent: [t => `✅ ${t} — Aynı gün çözüm!\n\nAracınızda sorun mu var? Ertelemeyin.\n\n📞 0541 970 09 11\n📍 Şaşmaz Oto Sanayi`]
  },
  customer: {
    story: [t => `⭐⭐⭐⭐⭐\n\n${t}\n\nMüşterilerimizin memnuniyeti bizim için en değerli referans.\n\n📍 H&C Otomotiv | Şaşmaz\n📞 0541 970 09 11\n\n💬 Siz de deneyiminizi Google'da paylaşın!`],
    short: [t => `⭐ ${t}\n\nTeşekkürler! 🙏\n\n📍 H&C | Şaşmaz\n📞 0541 970 09 11`],

    urgent: [t => `⭐ ${t}\n\nSiz de güvenilir servis arıyorsanız hemen arayın!\n\n📞 0541 970 09 11\n📍 Şaşmaz Oto Sanayi`]
  },
  towing: {
    story: [t => `🚛 ${t}\n\nYolda mı kaldınız? Endişelenmeyin!\nServisimizde tamir yaptırın, çekici ücreti bizden! 🆓\n\n📞 Hemen arayın: 0541 970 09 11\n📍 H&C Otomotiv | Şaşmaz`],
    short: [t => `🆘 ${t}\n\nÇekici bizden!\n\n📞 0541 970 09 11\n📍 Şaşmaz`],
    educational: [t => `🚛 ${t}\n\nYolda kalınca ne yapmalı?\n1. Güvenli yere çekin\n2. Dörtlüleri açın\n3. Bizi arayın: 0541 970 09 11\n\nGerisini biz hallederiz.\n\n📍 H&C Otomotiv | Şaşmaz`],
    urgent: [t => `🆘 YOLDA MI KALDINIZ?\n\n${t}\n\n7/24 çekici hizmeti — ücretsiz!\nHemen arayın!\n\n📞 0541 970 09 11\n📍 H&C Otomotiv | Şaşmaz`]
  }
};

const HASHTAGS = {
  campaign: "#kampanya #indirim #otoservis #araçbakım #şaşmaz #ankara #fırsat #hcotomotiv #uygunfiyat #servis",
  daily_work: "#gününtamiri #otoservis #mekanik #araçtamiri #şaşmaz #ankara #hcotomotiv #tamirci #servis #otomotiv",
  customer: "#müşterimemnuniyeti #googleyorum #güvenilir #otoservis #şaşmaz #ankara #hcotomotiv #5yıldız #referans",
  towing: "#çekici #yoldakaldım #ücretsizçekici #acilservis #ankara #şaşmaz #hcotomotiv #araçkurtarma #7günacık"
};

let state = {
  selectedCat: CATEGORIES[0],
  selectedTone: "story",
  frameMode: localStorage.getItem("hc_frame_mode") || "light",
  content: "",
  email: localStorage.getItem("hc_operator_email") || "",
  originalFile: null,
  originalUrl: "",
  uploadBlob: null,
  uploadName: "",
  output: null,
  previewUrl: "",
  variant: 0,
  showCalendar: false,
  showIdeas: false,
  copied: null,
  busy: false,
  drag: false,
  warning: "",
  error: "",
  success: ""
};

function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
}

function getTodayPlan() {
  const d = new Date().getDay();
  const map = [6,0,1,2,3,4,5];
  return { ...WEEKLY[map[d]], index: map[d] };
}

function currentOutput() {
  const cat = state.selectedCat;
  const templates = TEMPLATES[cat.id]?.[state.selectedTone] || TEMPLATES[cat.id]?.story;
  if (!cat || !state.content.trim() || !templates) return null;
  const caption = templates[state.variant % templates.length](state.content.trim());
  return { caption, hashtags: HASHTAGS[cat.id], canva: cat.canva, photoTip: cat.photoTip, label: cat.label };
}

function render() {
  state.output = currentOutput();
  const today = getTodayPlan();
  const todayCat = CATEGORIES.find(c => c.id === today.catId);
  const canSubmit = state.uploadBlob && state.selectedCat && state.content.trim() && state.email.trim() && !state.busy;
  const output = state.output;
  let html = "";

  html += `<div class="header">
    <div class="brand">H&C Otomotiv · Şaşmaz</div>
    <h1>Instagram Post Üretici</h1>
    <p>Fotoğraf çek → çerçeve seç → açıklamayı hazırla → PNG e-postana gelsin</p>
  </div>`;

  html += `<div class="today-banner">
    <div class="today-label">📅 Bugünün Önerisi — ${today.day}</div>
    <div class="today-content">${todayCat.icon} ${todayCat.label}</div>
    <div class="today-hint">${today.hint}</div>
  </div>`;

  html += `<span class="section-label">1. Fotoğraf Yükleyin</span>
  <button class="upload-zone ${state.drag ? "drag" : ""}" onclick="openPicker()" ondragover="onDrag(event)" ondragleave="offDrag(event)" ondrop="onDrop(event)">
    <div>
      <div class="upload-title">${state.uploadBlob ? "Fotoğraf hazır" : "Fotoğraf seç veya buraya bırak"}</div>
      <div class="upload-hint">Mobilde kamera açılır. Fotoğraf tarayıcıda 2048 px JPEG'e küçültülür.</div>
      ${state.uploadName ? `<div class="upload-meta">${escapeHtml(state.uploadName)}</div>` : ""}
    </div>
    ${state.originalUrl ? `<img class="thumb" src="${state.originalUrl}" alt="Seçilen fotoğraf önizlemesi">` : `<div class="thumb"></div>`}
  </button>`;

  if (state.warning) html += `<div class="warning">${escapeHtml(state.warning)}</div>`;

  html += `<span class="section-label">2. Çerçeve Modu</span>
  <div class="frame-row">
    <button class="frame-btn ${state.frameMode === "light" ? "active" : ""}" onclick="pickFrame('light')">Açık Çerçeve</button>
    <button class="frame-btn ${state.frameMode === "dark" ? "active" : ""}" onclick="pickFrame('dark')">Koyu Çerçeve</button>
  </div>`;

  html += `<div class="toggle-row">
    <button class="toggle-btn ${state.showCalendar ? "active" : ""}" onclick="toggleCal()">📆 Haftalık Plan</button>
    <button class="toggle-btn ${state.showIdeas ? "active" : ""}" onclick="toggleIdeas()">💡 İçerik Fikirleri</button>
  </div>`;

  if (state.showCalendar) {
    html += `<div class="panel"><div class="panel-inner"><h3>Haftalık İçerik Takvimi</h3>`;
    WEEKLY.forEach((w, i) => {
      const cat = CATEGORIES.find(c => c.id === w.catId);
      html += `<div class="week-row">
        <div class="week-day ${i === today.index ? "today" : ""}">${w.day}</div>
        <div class="week-icon">${cat.icon}</div>
        <div class="week-info">
          <div class="week-cat">${cat.label}</div>
          <div class="week-hint">${w.hint}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  if (state.showIdeas && state.selectedCat && IDEAS[state.selectedCat.id]) {
    html += `<div class="panel"><div class="panel-inner"><h3>${state.selectedCat.icon} ${state.selectedCat.label} İçerik Fikirleri</h3><div class="ideas-wrap">`;
    IDEAS[state.selectedCat.id].forEach(idea => {
      html += `<button class="idea-chip ${state.content === idea ? "selected" : ""}" onclick="pickIdea(${JSON.stringify(idea)})">${escapeHtml(idea)}</button>`;
    });
    html += `</div></div></div>`;
  }

  html += `<span class="section-label">3. Kategori Seçin</span><div class="cat-grid">`;
  CATEGORIES.forEach(cat => {
    html += `<button class="cat-btn ${state.selectedCat?.id === cat.id ? "selected" : ""}" onclick="pickCat('${cat.id}')">
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-name">${cat.label}</div>
      <div class="cat-desc">${cat.desc}</div>
    </button>`;
  });
  html += `</div>`;

  const placeholder = (IDEAS[state.selectedCat.id] || ["İçerik yazın"])[0];
  html += `<span class="section-label">4. İçerik / Konu</span>
  <textarea class="input-area" id="contentInput" maxlength="500" placeholder="Örn: '${escapeHtml(placeholder)}'" oninput="updateContent(this.value)">${escapeHtml(state.content)}</textarea>`;

  html += `<span class="section-label">5. Ton Seçin</span><div class="tone-row">`;
  TONES.forEach(t => {
    html += `<button class="tone-btn ${state.selectedTone === t.id ? "active" : ""}" onclick="pickTone('${t.id}')">${t.label}</button>`;
  });
  html += `</div>`;

  html += `<span class="section-label">6. E-posta</span>
  <input class="email-input" id="emailInput" type="email" inputmode="email" autocomplete="email" placeholder="operator@example.com" value="${escapeHtml(state.email)}" oninput="updateEmail(this.value)">`;

  if (output) html += renderOutput(output, false);

  html += `<div class="gen-row">
    <button class="gen-btn" ${canSubmit ? "" : "disabled"} onclick="submitPost()">${state.busy ? `<span class="spinner"></span> Hazırlanıyor...` : "Görsel Oluştur ve Gönder"}</button>
    ${output ? `<button class="gen-btn-alt" onclick="doVariant()">🔄 Farklı</button>` : ""}
  </div>`;

  if (state.error) html += `<div class="error">${escapeHtml(state.error)}</div>`;
  if (state.success) html += `<div class="success">${escapeHtml(state.success)}</div>`;

  if (state.previewUrl && output) html += renderOutput(output, true);

  html += `<div class="panel pipeline"><div class="panel-inner">
    <h3>📱 Günlük Pipeline — 2 Dakikada Post</h3>
    ${[
      {s:"1",t:"Serviste fotoğraf çek ve bu sayfaya yükle",time:"30 sn"},
      {s:"2",t:"Kategori, çerçeve, ton ve kısa konuyu seç",time:"45 sn"},
      {s:"3",t:"Görseli oluştur; PNG ve açıklama e-postaya gelsin",time:"15 sn"},
      {s:"4",t:"Telefonundan e-postayı aç, Instagram'a yapıştır ve paylaş",time:"30 sn"}
    ].map(p => `<div class="pipe-step"><div class="pipe-num">${p.s}</div><div class="pipe-text">${p.t}</div><div class="pipe-time">${p.time}</div></div>`).join("")}
  </div></div>`;

  html += `<div class="footer">H&C Otomotiv · Instagram Pipeline v0</div>`;
  document.getElementById("app").innerHTML = html;
}

function renderOutput(output, withPreview) {
  return `<div class="output-card">
    <div class="output-header">
      <div>
        <div class="output-title">${output.label} Postu</div>
        <div class="output-subtitle">${output.canva} · Ton: ${TONES.find(t => t.id === state.selectedTone)?.label || "Hikaye"} · ${state.frameMode === "light" ? "Açık" : "Koyu"} çerçeve</div>
      </div>
      <div class="output-badge">${withPreview ? "GÖNDERİLDİ" : "ÖNİZLEME"}</div>
    </div>
    ${withPreview ? `<div class="preview-wrap">
      <img class="preview-img" src="${state.previewUrl}" alt="Oluşturulan Instagram görseli">
      <div style="margin-top:12px"><a class="download-btn" href="${state.previewUrl}" download="hc-instagram-post.png">Tekrar İndir</a></div>
    </div>` : ""}
    <div class="caption-block">
      <div class="caption-header">
        <span class="caption-label">Açıklama Metni</span>
        <button class="copy-btn ${state.copied === "caption" ? "copied" : ""}" onclick="doCopy('caption')">${state.copied === "caption" ? "✓ Kopyalandı" : "Kopyala"}</button>
      </div>
      <div class="caption-text">${escapeHtml(output.caption)}</div>
    </div>
    <div class="caption-block" style="padding-top:0">
      <div class="caption-header">
        <span class="caption-label">Hashtag'ler</span>
        <button class="copy-btn ${state.copied === "hash" ? "copied" : ""}" onclick="doCopy('hash')">${state.copied === "hash" ? "✓ Kopyalandı" : "Kopyala"}</button>
      </div>
      <div class="hashtag-text">${escapeHtml(output.hashtags)}</div>
    </div>
  </div>`;
}

function openPicker() { document.getElementById("fileInput").click(); }
document.getElementById("fileInput").addEventListener("change", event => handleFile(event.target.files[0]));

function onDrag(event) { event.preventDefault(); state.drag = true; render(); }
function offDrag(event) { event.preventDefault(); state.drag = false; render(); }
function onDrop(event) {
  event.preventDefault();
  state.drag = false;
  handleFile(event.dataTransfer.files[0]);
}

async function handleFile(file) {
  if (!file) return;
  state.error = "";
  state.success = "";
  state.warning = "";
  if (file.size > 20 * 1024 * 1024) {
    state.warning = "Çok büyük bir fotoğraf seçtiniz. Lütfen normal modda çekin (ProRAW kapalı).";
    state.uploadBlob = null;
    render();
    return;
  }
  if (state.originalUrl) URL.revokeObjectURL(state.originalUrl);
  state.originalFile = file;
  state.originalUrl = URL.createObjectURL(file);
  state.uploadName = `${file.name || "kamera-fotografi"} · ${Math.round(file.size / 1024)} KB`;
  render();
  try {
    state.uploadBlob = await downscaleImage(file);
    state.uploadName += ` → ${Math.round(state.uploadBlob.size / 1024)} KB`;
  } catch (error) {
    state.uploadBlob = null;
    state.error = "Fotoğraf tarayıcıda hazırlanamadı. Lütfen başka bir fotoğraf deneyin.";
  }
  render();
}

function downscaleImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const max = 2048;
      const scale = Math.min(1, max / Math.max(img.naturalWidth, img.naturalHeight));
      const width = Math.round(img.naturalWidth * scale);
      const height = Math.round(img.naturalHeight * scale);
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d", { alpha: false });
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        URL.revokeObjectURL(url);
        blob ? resolve(blob) : reject(new Error("canvas export failed"));
      }, "image/jpeg", 0.85);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error("image decode failed"));
    };
    img.src = url;
  });
}

function pickCat(id) {
  state.selectedCat = CATEGORIES.find(c => c.id === id);
  state.variant = 0;
  state.previewUrl = "";
  render();
}
function pickTone(id) { state.selectedTone = id; state.variant = 0; state.previewUrl = ""; render(); }
function pickFrame(mode) {
  state.frameMode = mode;
  localStorage.setItem("hc_frame_mode", mode);
  state.previewUrl = "";
  render();
}
function pickIdea(idea) { state.content = idea; state.variant = 0; state.previewUrl = ""; render(); }
let contentRenderTimer = null;
function updateContent(value) {
  state.content = value;
  state.previewUrl = "";
  clearTimeout(contentRenderTimer);
  contentRenderTimer = setTimeout(render, 180);
}
function updateEmail(value) {
  state.email = value;
  localStorage.setItem("hc_operator_email", value);
}
function toggleCal() { state.showCalendar = !state.showCalendar; state.showIdeas = false; render(); }
function toggleIdeas() { state.showIdeas = !state.showIdeas; state.showCalendar = false; render(); }
function doVariant() { state.variant++; state.previewUrl = ""; render(); }

function doCopy(type) {
  const output = currentOutput();
  if (!output) return;
  const text = type === "caption" ? output.caption : output.hashtags;
  navigator.clipboard.writeText(text);
  state.copied = type;
  render();
  setTimeout(() => { state.copied = null; render(); }, 1600);
}

async function submitPost() {
  const output = currentOutput();
  if (!output || !state.uploadBlob || state.busy) return;
  state.busy = true;
  state.error = "";
  state.success = "";
  state.previewUrl = "";
  render();

  const form = new FormData();
  form.append("photo", state.uploadBlob, "hc-photo.jpg");
  form.append("category", state.selectedCat.id);
  form.append("tone", state.selectedTone);
  form.append("frame_mode", state.frameMode);
  form.append("content", state.content.trim());
  form.append("email", state.email.trim());
  form.append("variant", String(state.variant));

  try {
    const response = await fetch("/api/render", { method: "POST", body: form });
    const data = await response.json();
    if (!response.ok || !data.ok) throw new Error(data.error || "Görsel oluşturulamadı.");
    state.previewUrl = data.preview_url;
    state.success = data.email_sent ? "E-postaya gönderildi." : "Görsel hazır. E-posta gönderimi devre dışı.";
  } catch (error) {
    state.error = error.message || "Beklenmeyen bir hata oluştu.";
  } finally {
    state.busy = false;
    render();
  }
}

render();
</script>
</body>
</html>
